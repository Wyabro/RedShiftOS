<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#141a2e"/>
      <stop offset="55%" stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#05060c"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6a4d"/>
      <stop offset="100%" stop-color="#ff9d3a"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f83ff"/>
      <stop offset="18%" stop-color="#22c7e0"/>
      <stop offset="38%" stop-color="#35d38a"/>
      <stop offset="55%" stop-color="#ffd24a"/>
      <stop offset="72%" stop-color="#ff9a3d"/>
      <stop offset="88%" stop-color="#ff5a4d"/>
      <stop offset="100%" stop-color="#d43a5a"/>
    </linearGradient>
    <radialGradient id="planet" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ff8a5a"/>
      <stop offset="60%" stop-color="#e0432f"/>
      <stop offset="100%" stop-color="#7c1d1d"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".5"/><circle cx="300" cy="140" r="1" opacity=".35"/>
    <circle cx="520" cy="60" r="1.2" opacity=".45"/><circle cx="1180" cy="120" r="1" opacity=".4"/>
    <circle cx="1360" cy="60" r="1.5" opacity=".5"/><circle cx="1540" cy="160" r="1" opacity=".35"/>
    <circle cx="80" cy="520" r="1.2" opacity=".3"/><circle cx="1560" cy="560" r="1.2" opacity=".3"/>
    <circle cx="220" cy="880" r="1" opacity=".3"/><circle cx="1420" cy="900" r="1.3" opacity=".35"/>
    <circle cx="760" cy="30" r="1" opacity=".3"/><circle cx="980" cy="180" r="1" opacity=".3"/>
  </g>

  <!-- ringed planet (redshift / astronomy nod) -->
  <g transform="translate(1486,96)">
    <ellipse cx="0" cy="0" rx="46" ry="14" fill="none" stroke="#ff7a5a" stroke-opacity=".55" stroke-width="2" transform="rotate(-22)"/>
    <circle cx="0" cy="0" r="23" fill="url(#planet)"/>
    <ellipse cx="0" cy="0" rx="46" ry="14" fill="none" stroke="#ff5a4d" stroke-opacity=".9" stroke-width="2" transform="rotate(-22)" stroke-dasharray="72 200"/>
  </g>

  <!-- header -->
  <text x="800" y="96" text-anchor="middle" font-size="66" font-weight="800" letter-spacing="1">
    <tspan fill="url(#title)">REDSHIFT</tspan><tspan fill="#e7ecf6">OS</tspan>
  </text>
  <text x="800" y="130" text-anchor="middle" font-size="17" letter-spacing="6" fill="#8b95ab">THE OPERATING SYSTEM FOR BUILDING BETTER GAMES</text>
  <rect x="620" y="150" width="360" height="4" rx="2" fill="url(#spectrum)"/>

  <!-- FOUNDATION band -->
  <rect x="56" y="192" width="1488" height="150" rx="16" fill="#ffffff" fill-opacity="0.025" stroke="#ff6b5c" stroke-opacity="0.28"/>
  <text x="78" y="222" font-size="17" font-weight="700" letter-spacing="2" fill="#ff7d6b">FOUNDATION</text>
  <text x="214" y="222" font-size="13.5" fill="#8b95ab">· how we think — loaded first, every session, and binding</text>
  <g font-size="13" font-weight="700" fill="#eef2f8">
    <!-- 6 pillar cards -->
    <g><rect x="76" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="76" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="96" y="276">PHILOSOPHY</text><text x="96" y="298" font-size="11" font-weight="400" fill="#8b95ab">why we build this way</text></g>
    <g><rect x="320" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="320" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="340" y="276">MANIFESTO</text><text x="340" y="298" font-size="11" font-weight="400" fill="#8b95ab">the non-negotiables</text></g>
    <g><rect x="564" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="564" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="584" y="276">LESSONS LEARNED</text><text x="584" y="298" font-size="11" font-weight="400" fill="#8b95ab">never the same mistake twice</text></g>
    <g><rect x="808" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="808" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="828" y="276">ANTI-PATTERNS</text><text x="828" y="298" font-size="11" font-weight="400" fill="#8b95ab">smells to catch early</text></g>
    <g><rect x="1052" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="1052" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="1072" y="276">DECISION FRAMEWORK</text><text x="1072" y="298" font-size="11" font-weight="400" fill="#8b95ab">decide, then log it</text></g>
    <g><rect x="1296" y="240" width="228" height="86" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/><rect x="1296" y="240" width="4" height="86" rx="2" fill="#ff6b5c"/><text x="1316" y="276">FEATURE LIFECYCLE</text><text x="1316" y="298" font-size="11" font-weight="400" fill="#8b95ab">idea → merge, no skipping</text></g>
  </g>

  <!-- LIFECYCLE band -->
  <text x="78" y="392" font-size="17" font-weight="700" letter-spacing="2" fill="#e7ecf6">THE DEVELOPMENT LIFECYCLE</text>
  <text x="1524" y="392" text-anchor="end" font-size="12.5" font-style="italic" fill="#7f8aa0">cool → warm · the build redshifts toward ship</text>

  <g>
    <!-- 7 phase chips: x = 56 + i*214, w=200, y=408 h=94; colors shift blue→red -->
    <g><rect x="56" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#4f83ff" stroke-opacity="0.6"/><circle cx="82" cy="436" r="14" fill="#4f83ff"/><text x="82" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">1</text><text x="72" y="474" font-size="13" font-weight="700" fill="#eef2f8">PROJECT</text><text x="72" y="492" font-size="10.5" fill="#8b95ab">define the game</text></g>
    <g><rect x="270" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#22c7e0" stroke-opacity="0.6"/><circle cx="296" cy="436" r="14" fill="#22c7e0"/><text x="296" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">2</text><text x="286" y="474" font-size="13" font-weight="700" fill="#eef2f8">DESIGN</text><text x="286" y="492" font-size="10.5" fill="#8b95ab">shape the experience</text></g>
    <g><rect x="484" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#35d38a" stroke-opacity="0.6"/><circle cx="510" cy="436" r="14" fill="#35d38a"/><text x="510" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">3</text><text x="500" y="474" font-size="13" font-weight="700" fill="#eef2f8">ENGINEERING</text><text x="500" y="492" font-size="10.5" fill="#8b95ab">set the standards</text></g>
    <g><rect x="698" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffd24a" stroke-opacity="0.6"/><circle cx="724" cy="436" r="14" fill="#ffd24a"/><text x="724" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">4</text><text x="714" y="474" font-size="13" font-weight="700" fill="#eef2f8">IMPLEMENTATION</text><text x="714" y="492" font-size="10.5" fill="#8b95ab">build it</text></g>
    <g><rect x="912" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ff9a3d" stroke-opacity="0.6"/><circle cx="938" cy="436" r="14" fill="#ff9a3d"/><text x="938" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">5</text><text x="928" y="474" font-size="13" font-weight="700" fill="#eef2f8">PLAYTESTING</text><text x="928" y="492" font-size="10.5" fill="#8b95ab">players over assumptions</text></g>
    <g><rect x="1126" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ff5a4d" stroke-opacity="0.6"/><circle cx="1152" cy="436" r="14" fill="#ff5a4d"/><text x="1152" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">6</text><text x="1142" y="474" font-size="13" font-weight="700" fill="#eef2f8">PRODUCTION</text><text x="1142" y="492" font-size="10.5" fill="#8b95ab">ship &amp; prove it</text></g>
    <g><rect x="1340" y="408" width="200" height="94" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#d43a5a" stroke-opacity="0.6"/><circle cx="1366" cy="436" r="14" fill="#d43a5a"/><text x="1366" y="441" text-anchor="middle" font-size="14" font-weight="800" fill="#08101c">7</text><text x="1356" y="474" font-size="13" font-weight="700" fill="#eef2f8">POSTMORTEMS</text><text x="1356" y="492" font-size="10.5" fill="#8b95ab">learn &amp; feed back</text></g>
    <!-- chevrons between chips -->
    <g fill="#8b95ab" font-size="16" font-weight="700" text-anchor="middle">
      <text x="263" y="461">›</text><text x="477" y="461">›</text><text x="691" y="461">›</text><text x="905" y="461">›</text><text x="1119" y="461">›</text><text x="1333" y="461">›</text>
    </g>
  </g>

  <!-- feedback loop -->
  <path d="M 1440 512 L 1440 540 Q 1440 552 1428 552 L 172 552 Q 160 552 160 540 L 160 372" fill="none" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="6 7"/>
  <path d="M 160 380 l -6 12 l 12 0 z" fill="#a78bfa" fill-opacity="0.8"/>
  <rect x="590" y="538" width="420" height="28" rx="14" fill="#0a0e1c" stroke="#a78bfa" stroke-opacity="0.4"/>
  <text x="800" y="557" text-anchor="middle" font-size="12.5" font-weight="600" fill="#c4b5fd">FEEDBACK LOOP · every shipped project makes the OS smarter</text>

  <!-- AI COLLABORATION LAYER -->
  <rect x="56" y="596" width="724" height="248" rx="16" fill="#ffffff" fill-opacity="0.025" stroke="#34d3c3" stroke-opacity="0.3"/>
  <text x="80" y="628" font-size="16" font-weight="700" letter-spacing="1.5" fill="#3fded0">AI COLLABORATION LAYER</text>
  <text x="80" y="650" font-size="12" fill="#8b95ab">cross-cutting — applies to every phase</text>
  <g>
    <g><circle cx="90" cy="686" r="4" fill="#34d3c3"/><text x="106" y="691" font-size="13.5" font-weight="700" fill="#eef2f8">Model Routing</text><text x="106" y="710" font-size="11.5" fill="#8b95ab">the right model for the task; watch velocity debt</text></g>
    <g><circle cx="90" cy="736" r="4" fill="#34d3c3"/><text x="106" y="741" font-size="13.5" font-weight="700" fill="#eef2f8">Triage &amp; Recovery</text><text x="106" y="760" font-size="11.5" fill="#8b95ab">unstick a looping agent; revert over rescue</text></g>
    <g><circle cx="90" cy="786" r="4" fill="#34d3c3"/><text x="106" y="791" font-size="13.5" font-weight="700" fill="#eef2f8">Prompt Library</text><text x="106" y="810" font-size="11.5" fill="#8b95ab">reusable moves: plan, review, diagnose, verify</text></g>
    <g><circle cx="430" cy="686" r="4" fill="#34d3c3"/><text x="446" y="691" font-size="13.5" font-weight="700" fill="#eef2f8">The Working Loop</text><text x="446" y="710" font-size="11.5" fill="#8b95ab">explore → plan → approve →</text><text x="446" y="726" font-size="11.5" fill="#8b95ab">review → commit → validate → handoff</text></g>
    <g><circle cx="430" cy="770" r="4" fill="#34d3c3"/><text x="446" y="775" font-size="13.5" font-weight="700" fill="#eef2f8">AI builds — you direct</text><text x="446" y="794" font-size="11.5" fill="#8b95ab">vision, pillars, taste stay human</text></g>
  </g>

  <!-- GAME_TEMPLATE -->
  <rect x="820" y="596" width="724" height="248" rx="16" fill="#ffffff" fill-opacity="0.025" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="844" y="628" font-size="16" font-weight="700" letter-spacing="1.5" fill="#b39cff">GAME_TEMPLATE</text>
  <text x="844" y="650" font-size="12" fill="#8b95ab">every new game starts here — the OS rides beside it</text>
  <g font-size="12.5" fill="#d7ddec">
    <g><circle cx="856" cy="685" r="9" fill="#a78bfa" fill-opacity="0.9"/><text x="856" y="690" text-anchor="middle" font-size="11" font-weight="800" fill="#0a0e1c">1</text><text x="878" y="690">Copy AGENTS + PROJECT + Tasks into the new repo</text></g>
    <g><circle cx="856" cy="724" r="9" fill="#a78bfa" fill-opacity="0.9"/><text x="856" y="729" text-anchor="middle" font-size="11" font-weight="800" fill="#0a0e1c">2</text><text x="878" y="729">Wire RedShiftOS in (submodule or sibling)</text></g>
    <g><circle cx="856" cy="763" r="9" fill="#a78bfa" fill-opacity="0.9"/><text x="856" y="768" text-anchor="middle" font-size="11" font-weight="800" fill="#0a0e1c">3</text><text x="878" y="768">Fill the PROJECT contract, then prove the loop</text></g>
    <g><circle cx="856" cy="802" r="9" fill="#a78bfa" fill-opacity="0.9"/><text x="856" y="807" text-anchor="middle" font-size="11" font-weight="800" fill="#0a0e1c">4</text><text x="878" y="807">Every agent boots knowing how the studio builds</text></g>
  </g>

  <!-- footer -->
  <line x1="56" y1="878" x2="1544" y2="878" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="800" y="916" text-anchor="middle" font-size="22" font-weight="600" fill="#dfe5f0">The code changes from project to project. <tspan fill="#ff7d6b">The process shouldn't.</tspan></text>
  <text x="800" y="952" text-anchor="middle" font-size="13" letter-spacing="5" fill="#7f8aa0">★  RED SHIFT STUDIOS  ★</text>
</svg>
